  <script>
    (function () {
      try {
        var h = location.hostname;
        if (h && h !== "www.atachapter.com" && h !== "atachapter.com" && h !== "localhost" && h.indexOf("127.") !== 0) {
          location.replace("https://www.atachapter.com" + location.pathname + location.search + location.hash);
          return;
        }
      } catch (e) {}
      try {
        var tRaw = localStorage.getItem("ata-theme");
        var t = tRaw === "light" || tRaw === "dark" ? tRaw : "dark";
        document.documentElement.setAttribute("data-theme", t);
        var lRaw = localStorage.getItem("ata-lang");
        var lang = lRaw === "en" || lRaw === "tr" ? lRaw : "en";
        document.documentElement.setAttribute("data-lang", lang);
        document.documentElement.setAttribute("lang", lang === "en" ? "en" : "tr");
        var metaTc = document.querySelector('meta[name="theme-color"]');
        if (metaTc) metaTc.setAttribute("content", t === "dark" ? "#0a0a0a" : "#e4eef8");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
        document.documentElement.setAttribute("data-lang", "en");
        document.documentElement.setAttribute("lang", "en");
      }
    })();
  </script>
