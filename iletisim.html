<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ATA Chapter iletişim formu">
  <meta name="theme-color" content="#0a0a0a">
  <title>İletişim — ATA Chapter</title>
  <script>
    (function () {
      try {
        var h = location.hostname;
        if (h && h !== "www.atachapter.com" && h !== "atachapter.com" && h !== "localhost" && h.indexOf("127.") !== 0) {
          location.replace("https://www.atachapter.com" + location.pathname + location.search + location.hash);
          return;
        }
      } catch (e) {}
      try {
        var tRaw = localStorage.getItem("ata-theme");
        var t = tRaw === "light" || tRaw === "dark" ? tRaw : "dark";
        document.documentElement.setAttribute("data-theme", t);
        var lRaw = localStorage.getItem("ata-lang");
        var lang = lRaw === "en" || lRaw === "tr" ? lRaw : "en";
        document.documentElement.setAttribute("data-lang", lang);
        document.documentElement.setAttribute("lang", lang === "en" ? "en" : "tr");
      } catch (e) {}
    })();
  </script>
  <link rel="icon" type="image/png" href="images/app-icon.png">
  <link rel="canonical" href="https://www.atachapter.com/iletisim.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app-site.css?v=122">
</head>
<body data-page="contact">
  <div class="app-shell">
    <header class="app-top">
      <div class="container app-top__inner">
        <a class="app-brand" href="anasayfa/">
          <span class="app-brand__mark"><img src="images/app-icon.png" width="32" height="32" alt=""></span>
          ATA Chapter
        </a>
        <div class="app-nav-panel">
          <nav id="site-primary-nav" class="app-menu" aria-label="Site">
            <a href="anasayfa/" data-i18n="nav.home">Ana sayfa</a>
            <a href="anasayfa/#ozellikler" data-i18n="nav.features">Özellikler</a>
            <a href="chapterlar.html" data-i18n="nav.chapters">Chapterlar</a>
            <a href="indir.html" data-i18n="nav.download">İndir</a>
            <a href="nasil-yuklenir.html" data-i18n="nav.how">Kurulum</a>
            <a href="anasayfa/#credits" data-i18n="nav.team">Ekip</a>
          </nav>
        </div>
        <div class="app-top__end">
          <button type="button" class="app-nav-toggle" aria-expanded="false" aria-controls="site-primary-nav" data-i18n-aria-label="nav.menuOpen">
            <span class="app-nav-toggle__bars" aria-hidden="true"></span>
          </button>
          <div class="app-controls" role="toolbar" aria-label="Dil ve tema">
            <div class="lang-seg" role="group" aria-label="Dil">
              <button type="button" data-lang-btn="tr" aria-pressed="false">TR</button>
              <button type="button" data-lang-btn="en" aria-pressed="true">EN</button>
            </div>
            <button type="button" class="theme-toggle" data-theme-toggle aria-label="Tema">
              <span class="theme-toggle__moon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              </span>
              <span class="theme-toggle__sun" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>

        </div>
      </div>
      <div class="app-nav-backdrop" data-app-nav-backdrop hidden aria-hidden="true"></div>
    </header>

    <main class="app-content container">
      <section class="section-block reveal">
        <h1>İletişim</h1>
        <p class="muted">Mailin ve durum bilgisini yaz, mesajın direkt yöneticinin mailine ulaşsın.</p>
        <form class="fb-form" action="https://formsubmit.co/yusufmirzasokmen@gmail.com" method="POST">
          <input type="hidden" name="_subject" value="ATA Chapter - Yeni İletişim Formu">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">
          <div class="fb-form__grid">
            <label class="fb-form__field fb-form__field--full">
              <span class="fb-form__label">E-posta adresin</span>
              <input class="fb-form__input" type="email" name="email" required placeholder="ornek@mail.com">
            </label>
            <label class="fb-form__field fb-form__field--full">
              <span class="fb-form__label">Durum / Konu</span>
              <input class="fb-form__input" type="text" name="durum" required placeholder="Örn: Hata bildirimi, iş birliği, öneri">
            </label>
            <label class="fb-form__field fb-form__field--full">
              <span class="fb-form__label">Mesaj</span>
              <textarea class="fb-form__textarea" name="mesaj" rows="6" required placeholder="Mesajını yaz..."></textarea>
            </label>
            <div class="fb-form__actions">
              <button class="btn btn--primary fb-form__btn" type="submit">Gönder</button>
            </div>
          </div>
        </form>
      </section>
    </main>
  </div>
